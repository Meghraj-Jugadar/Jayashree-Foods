<div class="auth-card">

  <!-- Mobile brand header -->
  <div class="mobile-brand">
    <mat-icon>factory</mat-icon>
    <span>Food Factory</span>
  </div>

  <div class="card-header">
    <h2>Welcome back</h2>
    <p>Sign in to your account to continue</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">

    <div class="field">
      <label class="field-label">Email or Mobile Number</label>
      <div class="input-wrap" [class.error]="form.get('identifier')?.touched && form.get('identifier')?.invalid">
        <mat-icon>{{ isPhone ? 'phone' : 'email' }}</mat-icon>
        <input class="field-input" formControlName="identifier"
               type="text" inputmode="text"
               placeholder="Email or mobile number" />
      </div>
      <span class="field-error" *ngIf="form.get('identifier')?.touched && form.get('identifier')?.hasError('required')">This field is required</span>
      <span class="field-error" *ngIf="form.get('identifier')?.touched && form.get('identifier')?.hasError('invalidIdentifier')">Enter a valid email or mobile number</span>
    </div>

    <div class="field">
      <label class="field-label">Password</label>
      <div class="input-wrap" [class.error]="form.get('password')?.touched && form.get('password')?.invalid">
        <mat-icon>lock</mat-icon>
        <input class="field-input" formControlName="password"
               [type]="showPass ? 'text' : 'password'" placeholder="Your password" />
        <button type="button" class="eye-btn" (click)="showPass = !showPass">
          <mat-icon>{{ showPass ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
      <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">Password is required</span>
    </div>

    <button class="submit-btn" type="submit" [disabled]="loading || form.invalid" [class.loading]="loading">
      <span class="spinner" *ngIf="loading"></span>
      <mat-icon *ngIf="!loading">login</mat-icon>
      {{ loading ? 'Signing in…' : 'Sign In' }}
    </button>

  </form>

  <p class="switch-link">Don't have an account? <a routerLink="/auth/register">Create one</a></p>

</div>
